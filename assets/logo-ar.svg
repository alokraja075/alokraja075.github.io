<svg width="196" height="56" viewBox="0 0 196 56" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Alok Raja logo">
  <defs>
    <linearGradient id="markGradient" x1="8" y1="8" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60A5FA"/>
      <stop offset="0.55" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="textGradient" x1="62" y1="16" x2="188" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#DBEAFE"/>
      <stop offset="0.65" stop-color="#93C5FD"/>
      <stop offset="1" stop-color="#A7F3D0"/>
    </linearGradient>
    <radialGradient id="innerGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(25 14) rotate(50) scale(34)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
