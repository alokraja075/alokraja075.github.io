    <rect x="8.7" y="8.7" width="38.6" height="38.6" rx="11.3" stroke="#FFFFFF" stroke-opacity="0.24" stroke-width="1.4"/>
    <path d="M14 26H42" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="1"/>
    <rect x="8" y="8" width="40" height="40" rx="12" fill="url(#innerGlow)"/>
    <text x="28" y="34" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" letter-spacing="0.8" fill="#FFFFFF">AR</text>
